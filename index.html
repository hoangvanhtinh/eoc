<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>결과 조회</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f5f5f5;
        display:flex;
        justify-content:center;
        padding:20px;
    }

    .wrap{
        width:100%;
        max-width:700px;
        background:white;
        padding:20px;
    }

    .title{
        font-size:24px;
        color:#666;
        margin-bottom:20px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        border-top:4px solid #55c7f5;
    }

    td{
        border-bottom:1px solid #ddd;
        padding:18px;
    }

    .left{
        width:35%;
        background:#d8edf7;
        font-size:20px;
        color:#333;
        font-weight:bold;
    }

    .right{
        background:white;
    }

    input,
    select{
        padding:10px;
        border:2px solid #999;
        border-radius:10px;
        font-size:20px;
        outline:none;
    }

    .birth{
        display:flex;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
    }

    .phone-wrap{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
    }

    .verify-btn{
        background:#1296ea;
        color:white;
        border:none;
        border-radius:10px;
        padding:12px 18px;
        font-size:18px;
        cursor:pointer;
    }

    .verify-btn:hover{
        opacity:.9;
    }

    .notice{
        margin-top:15px;
        color:#666;
        font-size:18px;
        line-height:1.8;
    }

    .red{
        color:red;
        margin-top:15px;
        font-weight:bold;
    }

    .submit-wrap{
        text-align:center;
        margin-top:40px;
    }

    .submit-btn{
        background:#1296ea;
        color:white;
        border:none;
        border-radius:12px;
        padding:20px 60px;
        font-size:40px;
        cursor:pointer;
    }

    .submit-btn:hover{
        opacity:.9;
    }

    @media(max-width:600px){

        .title{
            font-size:18px;
        }

        td{
            padding:12px;
        }

        .left{
            font-size:16px;
            width:40%;
        }

        input,
        select{
            width:100%;
            font-size:16px;
        }

        .verify-btn{
            width:100%;
            font-size:16px;
        }

        .submit-btn{
            width:100%;
            font-size:28px;
            padding:18px;
        }

        .notice{
            font-size:14px;
        }
    }
</style>
</head>

<body>

<div class="wrap">

    <div class="title">
        * 결과 확인을 위해 필요한 정보를 입력해주세요.
    </div>

    <table>

        <tr>
            <td class="left">이름</td>
            <td class="right">
                <input type="text">
            </td>
        </tr>
<tr>
            <td class="left">생년월일</td>
            <td class="right">

                <div class="birth">

                    <select>
                        <option>2026</option>
                    </select>

                    -

                    <select>
                        <option>1</option>
                    </select>

                    -

                    <select>
                        <option>1</option>
                    </select>

                </div>

            </td>
        </tr>

        <tr>
            <td class="left">성별</td>
            <td class="right">

                <select>
                    <option>남</option>
                    <option>여</option>
                </select>

            </td>
        </tr>

        <tr>
            <td class="left">휴대전화</td>
            <td class="right">

                <div class="phone-wrap">
                    <input type="tel" placeholder="숫자만 입력하세요">

                    <button class="verify-btn">
                        본인인증받기
                    </button>
                </div>

            </td>
        </tr>

    </table>

    <div class="notice">
        · 병원고객정보에 입력된 휴대폰 번호와 다를 경우는 인증이 어렵습니다.<br>
        · 휴대폰으로 발송된 인증번호를 입력해주세요<br>
        · 인증번호발송버튼을 클릭하시면 인증번호가 발송됩니다.(2~5초 소요)<br>
        · 인증번호를 입력하시고 "본인인증받기"버튼을 눌러주세요.<br>
        · 발송된 인증번호는 5분간 유효합니다.
    </div>

    <div class="notice red">
        · 본 사이트는 크롬에 최적화 되어있습니다.
    </div>

    <div class="submit-wrap">
        <button class="submit-btn">
            조회(Check)
        </button>
    </div>

</div>

</body>
</html>
